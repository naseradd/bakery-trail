<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0c0805" />
  <title>Marathon Éclair · MTL · 23 mai 2026</title>
  <meta name="description" content="Tournée dégustation d'éclairs à Montréal — 6 pâtisseries, samedi 23 mai 2026." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:           #0c0805;
      --surface:      #161009;
      --elevated:     #1f1510;
      --gold:         #c4a35a;
      --gold-bright:  #dbb96e;
      --gold-dim:     rgba(196, 163, 90, 0.25);
      --gold-glow:    rgba(196, 163, 90, 0.08);
      --cream:        #ecdfc8;
      --cream-dim:    #7a6245;
      --green:        #2d6b47;
      --green-bright: #4a9263;
      --green-dim:    rgba(45, 107, 71, 0.25);
      --red-dim:      rgba(180, 60, 60, 0.2);
      --border:       rgba(196, 163, 90, 0.1);
      --border-mid:   rgba(196, 163, 90, 0.2);
      --r:            16px;
      --r-sm:         10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { background: var(--bg); }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding-top: env(safe-area-inset-top);
      padding-bottom: calc(env(safe-area-inset-bottom) + 32px);
    }

    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    a { text-decoration: none; color: inherit; }

    /* ── Typography ─────────────────────────────────────────────── */
    .f-display { font-family: 'Cormorant Garamond', Georgia, serif; }
    .f-mono    { font-family: 'JetBrains Mono', monospace; }

    /* ── Header ─────────────────────────────────────────────────── */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding-top: env(safe-area-inset-top);
    }

    .header-inner {
      max-width: 480px;
      margin: 0 auto;
      padding: 14px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .header-wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 21px;
      font-weight: 700;
      color: var(--gold-bright);
      letter-spacing: -0.3px;
      line-height: 1;
    }

    .header-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--cream-dim);
      margin-top: 2px;
      letter-spacing: 0.3px;
    }

    .countdown {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--gold);
      background: var(--gold-glow);
      border: 1px solid var(--gold-dim);
      padding: 5px 11px;
      border-radius: 6px;
      white-space: nowrap;
      max-width: 60vw;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .countdown--live {
      color: var(--gold-bright);
      border-color: var(--gold);
      background: rgba(196, 163, 90, 0.16);
      animation: pulseGold 2.4s ease-in-out infinite;
    }

    .countdown--done {
      color: var(--green-bright);
      background: rgba(74, 146, 99, 0.14);
      border-color: var(--green-dim);
    }

    @keyframes pulseGold {
      0%, 100% { box-shadow: 0 0 0 0 rgba(196, 163, 90, 0); }
      50%      { box-shadow: 0 0 0 4px rgba(196, 163, 90, 0.10); }
    }

    .nav-tabs {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px 12px;
      display: flex;
      gap: 6px;
    }

    .nav-tab {
      flex: 1;
      text-align: center;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--cream-dim);
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-tab.active {
      background: var(--gold-glow);
      color: var(--gold-bright);
    }

    /* ── Main layout ─────────────────────────────────────────────── */
    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ── Hero ─────────────────────────────────────────────────────── */
    .hero {
      padding: 36px 0 28px;
      text-align: center;
    }

    .hero-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 52px;
      font-weight: 700;
      line-height: 1.05;
      color: var(--cream);
      letter-spacing: -1px;
    }

    .hero-title em {
      font-style: italic;
      color: var(--gold);
    }

    .hero-rule {
      width: 48px;
      height: 1px;
      background: var(--gold-dim);
      margin: 18px auto;
    }

    .hero-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--cream-dim);
      line-height: 1.7;
    }

    /* ── Route CTAs ─────────────────────────────────────────────── */
    .route-section { margin-bottom: 32px; }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      background: var(--gold);
      color: #0c0805;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      padding: 17px;
      border-radius: var(--r);
      letter-spacing: -0.2px;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-primary:active { transform: scale(0.98); opacity: 0.88; }

    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      color: var(--cream);
      font-size: 14px;
      font-weight: 600;
      padding: 13px;
      border-radius: var(--r);
      transition: border-color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-secondary:active { transform: scale(0.97); border-color: var(--gold-dim); }

    /* ── Section heading ─────────────────────────────────────────── */
    .section-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--cream);
      margin-bottom: 16px;
    }

    /* ── Stop cards ─────────────────────────────────────────────── */
    .stop-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 14px;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.35s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stop-card:nth-child(1) { animation-delay: 0.05s; }
    .stop-card:nth-child(2) { animation-delay: 0.1s;  }
    .stop-card:nth-child(3) { animation-delay: 0.15s; }
    .stop-card:nth-child(4) { animation-delay: 0.2s;  }
    .stop-card:nth-child(5) { animation-delay: 0.25s; }
    .stop-card:nth-child(6) { animation-delay: 0.3s;  }

    .stop-card.is-next {
      border-color: var(--gold-dim);
      box-shadow: 0 0 24px rgba(196, 163, 90, 0.07);
    }

    .stop-card.is-visited { opacity: 0.6; }
    .stop-card.is-visited .card-header { opacity: 0.8; }

    .card-header {
      padding: 18px 20px 16px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      border-bottom: 1px solid var(--border);
    }

    .stop-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 42px;
      font-weight: 700;
      line-height: 1;
      color: rgba(196, 163, 90, 0.2);
      min-width: 46px;
      text-align: right;
      padding-top: 2px;
      transition: color 0.2s;
    }

    .stop-card.is-next .stop-num { color: var(--gold); }

    .stop-info { flex: 1; min-width: 0; }

    .stop-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 23px;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.15;
    }

    .stop-details {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 5px;
    }

    .stop-detail {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--cream-dim);
      letter-spacing: 0.2px;
    }

    .stop-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      margin-top: 6px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .badge-next {
      background: var(--gold-glow);
      border: 1px solid var(--gold-dim);
      color: var(--gold-bright);
    }

    .badge-visited {
      background: rgba(74, 146, 99, 0.12);
      border: 1px solid var(--green-dim);
      color: var(--green-bright);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Card body ───────────────────────────────────────────────── */
    .card-body { padding: 16px 20px; }

    .transit-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--cream-dim);
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 14px;
    }

    .transit-mode {
      font-weight: 500;
      color: var(--cream);
    }

    /* ── BIXI station buttons ───────────────────────────────────── */
    .bixi-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 14px;
    }

    .btn-bixi {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(196, 163, 90, 0.06);
      border: 1px solid var(--gold-dim);
      color: var(--cream);
      padding: 9px 10px;
      border-radius: var(--r-sm);
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      min-width: 0;
    }

    .btn-bixi:active {
      transform: scale(0.97);
      border-color: var(--gold);
      background: rgba(196, 163, 90, 0.12);
    }

    .bixi-icon {
      font-size: 16px;
      line-height: 1;
      flex-shrink: 0;
    }

    .bixi-label {
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0;
    }

    .bixi-action {
      font-size: 11px;
      font-weight: 700;
      color: var(--gold-bright);
      letter-spacing: 0.2px;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
    }

    .bixi-station {
      font-size: 11px;
      color: var(--cream-dim);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Flavors ─────────────────────────────────────────────────── */
    .flavors {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 16px;
    }

    .flavor-tag {
      font-size: 11px;
      background: rgba(196, 163, 90, 0.07);
      border: 1px solid rgba(196, 163, 90, 0.14);
      color: var(--gold);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── Action row ──────────────────────────────────────────────── */
    .action-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .btn-maps {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: var(--gold);
      color: #0c0805;
      font-size: 14px;
      font-weight: 700;
      padding: 12px 16px;
      border-radius: var(--r-sm);
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-maps:active { transform: scale(0.97); opacity: 0.85; }

    .btn-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      background: var(--elevated);
      border: 1px solid var(--border-mid);
      color: var(--cream);
      font-size: 11px;
      font-weight: 500;
      padding: 10px 14px;
      border-radius: var(--r-sm);
      min-width: 58px;
      transition: border-color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-icon:active { transform: scale(0.95); border-color: var(--gold-dim); }

    .btn-icon.disabled {
      opacity: 0.25;
      pointer-events: none;
    }

    .btn-icon svg { width: 17px; height: 17px; }

    /* ── Check-in ─────────────────────────────────────────────────── */
    .checkin-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(74, 146, 99, 0.08);
      border: 1px solid var(--green-dim);
      color: var(--green-bright);
      font-size: 14px;
      font-weight: 600;
      padding: 13px;
      border-radius: var(--r-sm);
      margin-top: 8px;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .checkin-btn:active { transform: scale(0.98); }

    .checkin-btn.done {
      background: rgba(74, 146, 99, 0.15);
      border-color: rgba(74, 146, 99, 0.4);
      cursor: default;
    }

    .checkin-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* ── Photos ──────────────────────────────────────────────────── */
    .photos-section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .photos-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--cream-dim);
      margin-bottom: 10px;
      font-family: 'JetBrains Mono', monospace;
    }

    .photos-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .photos-strip::-webkit-scrollbar { display: none; }

    .photo-thumb {
      flex-shrink: 0;
      width: 76px;
      height: 76px;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid var(--border-mid);
      cursor: pointer;
      transition: transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .photo-thumb:active { transform: scale(0.93); }

    .add-photo-btn {
      flex-shrink: 0;
      width: 76px;
      height: 76px;
      border-radius: 10px;
      border: 1px dashed rgba(196, 163, 90, 0.3);
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--cream-dim);
      font-size: 10px;
      font-weight: 500;
      transition: border-color 0.15s, color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .add-photo-btn:active { border-color: var(--gold); color: var(--gold); transform: scale(0.95); }
    .add-photo-btn svg { width: 22px; height: 22px; }

    /* ── Rating form ─────────────────────────────────────────────── */
    .rating-section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .rating-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--cream-dim);
      margin-bottom: 8px;
    }

    .rating-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(196, 163, 90, 0.05);
    }

    .rating-row:last-child { border-bottom: none; }

    .rating-row--overall {
      margin-top: 4px;
      padding-top: 11px;
      border-top: 1px dashed var(--gold-dim);
      border-bottom: none;
    }

    .rating-row--overall .rating-label {
      color: var(--gold-bright);
      font-weight: 700;
    }

    .rating-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--cream);
      flex-shrink: 0;
    }

    .stars {
      display: flex;
      gap: 2px;
    }

    .star-btn {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(196, 163, 90, 0.2);
      padding: 0;
      transition: color 0.12s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
    }

    .star-btn svg { width: 22px; height: 22px; }
    .star-btn:active { transform: scale(0.85); }
    .star-btn.filled { color: var(--gold-bright); }

    /* ── Per-stop share trigger ──────────────────────────────────── */
    .share-trigger-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border-mid);
      color: var(--cream);
      font-size: 13px;
      font-weight: 600;
      padding: 12px;
      border-radius: var(--r-sm);
      margin-top: 12px;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .share-trigger-btn:active {
      transform: scale(0.98);
      border-color: var(--gold-dim);
      background: rgba(196, 163, 90, 0.05);
    }

    .share-trigger-btn svg { width: 15px; height: 15px; flex-shrink: 0; color: var(--gold); }

    /* ── Bottom-sheet drawer ─────────────────────────────────────── */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      z-index: 180;
      background: rgba(0, 0, 0, 0);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      transition: background 0.28s ease;
    }

    .drawer-overlay.open { background: rgba(0, 0, 0, 0.55); }

    .drawer {
      width: 100%;
      max-width: 480px;
      background: var(--elevated);
      border: 1px solid var(--border-mid);
      border-bottom: none;
      border-radius: 20px 20px 0 0;
      padding: 10px 20px calc(28px + env(safe-area-inset-bottom));
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
      box-shadow: 0 -16px 40px rgba(0, 0, 0, 0.4);
    }

    .drawer-overlay.open .drawer { transform: translateY(0); }

    .drawer-grabber {
      width: 38px;
      height: 4px;
      background: rgba(196, 163, 90, 0.25);
      border-radius: 2px;
      margin: 6px auto 18px;
    }

    .drawer-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--cream);
      text-align: center;
      margin-bottom: 18px;
      padding: 0 8px;
    }

    .drawer-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .drawer-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--cream);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 15px 18px;
      border-radius: 12px;
      text-align: left;
      transition: transform 0.1s, border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .drawer-btn:active {
      transform: scale(0.98);
      border-color: var(--gold-dim);
      background: var(--elevated);
    }

    .drawer-icon {
      font-size: 20px;
      width: 26px;
      text-align: center;
      flex-shrink: 0;
      line-height: 1;
    }

    .drawer-btn--messenger {
      background: rgba(0, 132, 255, 0.08);
      border-color: rgba(0, 132, 255, 0.3);
      color: #4ea3ff;
    }

    .drawer-btn--messenger:active {
      background: rgba(0, 132, 255, 0.16);
      border-color: rgba(0, 132, 255, 0.5);
    }

    /* ── Floating action button ──────────────────────────────────── */
    .fab-download {
      position: fixed;
      right: 20px;
      bottom: calc(22px + env(safe-area-inset-bottom));
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--gold);
      color: #0c0805;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.5),
                  0 0 0 1px rgba(196, 163, 90, 0.4);
      z-index: 90;
      transition: transform 0.12s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .fab-download:active {
      transform: scale(0.92);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.5);

    /* ── Footer ──────────────────────────────────────────────────── */
    .page-footer {

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
    }
  </style>
